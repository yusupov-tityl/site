name: Deploy to VPS

# Frontend now builds on the CI runner so Puppeteer's body-snapshot
# prerender step can use the preinstalled Chrome. The resulting
# dist/public/ is rsync-ed onto the VPS. api-server still builds on
# the VPS — it reads /etc/itityl-api.env (root-readable) directly
# from the systemd unit's env file, so CI never needs the secrets.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend (vite + prerender with body snapshot)
        env:
          PORT: "5173"
          BASE_PATH: "/"
          NODE_ENV: "production"
          # ubuntu-latest preinstalls Chrome at this path. Tell our
          # prerender script to use it for puppeteer-core.
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: pnpm -C artifacts/itityl run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync prerendered dist to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            artifacts/itityl/dist/public/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/ittool/artifacts/itityl/dist/public/

      - name: Sync api-server source + rebuild + restart
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash <<'EOF'
            set -e
            cd ~/ittool
            git fetch origin
            # Keep ~/ittool in sync with main so api-server build sees
            # latest code. We DON'T touch artifacts/itityl/dist — that
            # was just rsynced from CI and is fresher than what git
            # would restore.
            git stash push -m "preserve-rsynced-dist" -- artifacts/itityl/dist 2>/dev/null || true
            git reset --hard origin/main
            git stash pop 2>/dev/null || true

            pnpm install --no-frozen-lockfile
            pnpm -C artifacts/api-server run build

            # Apply DB schema changes if env file is present.
            if [ -f /etc/itityl-api.env ]; then
              # shellcheck disable=SC2046
              export $(grep -E '^DATABASE_URL=' /etc/itityl-api.env | xargs)
              pnpm -C lib/db run push-force || echo "drizzle push failed — investigate"
              unset DATABASE_URL
            fi

            if systemctl list-unit-files | grep -q itityl-api.service; then
              sudo systemctl restart itityl-api.service
            fi
            sudo systemctl reload nginx
          EOF
