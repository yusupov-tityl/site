name: Fix — switch SMTP to port 587

# Switches /etc/itityl-api.env from SMTP_PORT=465 (TLS-on-connect) to
# SMTP_PORT=587 (STARTTLS upgrade). Russian VPS hosters routinely block
# outbound 465/25 to prevent spam abuse but leave 587 open. If 587 is
# also blocked, we'll see ETIMEDOUT in the next contact attempt logs
# and switch to an HTTP API (Resend / SendPulse).

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Patch SMTP port + restart
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash <<'REMOTE'
            set -euo pipefail
            sudo sed -i 's|^SMTP_PORT=.*|SMTP_PORT=587|' /etc/itityl-api.env
            sudo sed -i 's|^SMTP_SECURE=.*|SMTP_SECURE=false|' /etc/itityl-api.env
            echo "After patch:"
            sudo grep -E '^SMTP_(PORT|SECURE)' /etc/itityl-api.env

            # Connectivity test BEFORE restart so we know whether 587 is
            # reachable at all from this VPS. If timeout → hoster blocks
            # ALL outbound SMTP → need to switch to HTTP API.
            echo
            echo "=== Probing smtp.yandex.ru:587 (5s timeout) ==="
            timeout 5 bash -c 'cat </dev/null > /dev/tcp/smtp.yandex.ru/587' \
              && echo "✓ port 587 OPEN — email should work after restart" \
              || echo "✗ port 587 BLOCKED — SMTP useless from this host, need HTTP API"

            echo
            echo "=== Probing api.telegram.org:443 (5s timeout) ==="
            timeout 5 bash -c 'cat </dev/null > /dev/tcp/api.telegram.org/443' \
              && echo "✓ Telegram API reachable" \
              || echo "✗ Telegram API BLOCKED — need Cloudflare Worker relay"

            sudo systemctl restart itityl-api
            sleep 2
            echo
            echo "=== curl /api/healthz ==="
            curl -fsS http://127.0.0.1:3000/api/healthz && echo
          REMOTE
