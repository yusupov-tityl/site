name: Fix — restore nginx vhost

# One-shot recovery. The previous setup-vps.sh runs mangled the
# sites-available/itityl.ru config by injecting a malformed block.
# Writes back the clean known-good content (base64-encoded inline below
# to dodge YAML/heredoc parsing hell) and removes the bogus symlink.

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Write clean vhost + reload nginx
        env:
          # Base64-encoded vhost content. __USER_HOME__ is a literal
          # placeholder we substitute on the VPS to the deploying user's
          # $HOME so the `root` path stays portable across hosts.
          VHOST_B64: ""
        run: |
          ssh -o SendEnv=VHOST_B64 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "VHOST_B64='${VHOST_B64}' bash -s" <<'REMOTE'
            set -euo pipefail
            TARGET=/etc/nginx/sites-available/itityl.ru
            echo "Backing up current mangled file to ${TARGET}.broken.$(date +%s)"
            sudo cp -a "${TARGET}" "${TARGET}.broken.$(date +%s)" 2>/dev/null || true

            # Decode the vhost template and substitute $HOME.
            DECODED="$(mktemp)"
            echo "${VHOST_B64}" | base64 -d > "${DECODED}"
            sed -i "s|__USER_HOME__|${HOME}|g" "${DECODED}"

            sudo install -m 644 -o root -g root "${DECODED}" "${TARGET}"
            rm -f "${DECODED}"

            echo "Removing bogus symlink itityl.ru.bak.1782157806"
            sudo rm -f /etc/nginx/sites-enabled/itityl.ru.bak.1782157806

            echo "nginx -t"
            sudo nginx -t

            echo "Reloading nginx"
            sudo systemctl reload nginx

            echo
            echo "Final state:"
            ls -la /etc/nginx/sites-enabled/
          REMOTE
