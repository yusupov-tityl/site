openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact request
      description: Saves a contact request and notifies the team.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequestInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmissionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactRequestInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 320
        company:
          type: string
          maxLength: 200
        message:
          type: string
          minLength: 10
          maxLength: 5000
        source:
          type: string
          maxLength: 100
        website:
          type: string
          description: Honeypot field — must be empty
          maxLength: 200
        captchaToken:
          type: string
          description: Cloudflare Turnstile token; verified server-side when secret is configured.
          maxLength: 4096
      required:
        - name
        - email
        - message
    ContactSubmissionResult:
      type: object
      properties:
        ok:
          type: boolean
        id:
          type: integer
      required:
        - ok
    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
