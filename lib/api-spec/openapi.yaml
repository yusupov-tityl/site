openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact request
      description: Saves a contact request and notifies the team.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequestInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmissionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactRequestInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        company:
          type: string
          minLength: 1
          maxLength: 200
        position:
          type: string
          maxLength: 200
          description: Должность контакта (необязательно).
        email:
          type: string
          format: email
          maxLength: 320
          description: Email контакта. Должно быть заполнено хотя бы одно из полей email или phone.
        phone:
          type: string
          maxLength: 40
          description: Телефон контакта (любой формат, нормализуется на сервере). Должно быть заполнено хотя бы одно из полей email или phone.
        message:
          type: string
          maxLength: 5000
          description: Описание задачи (необязательно).
        requestType:
          type: string
          enum:
            - diagnostics
            - pilot
            - consultation
            - other
          description: Тип запроса лида.
        consent:
          type: boolean
          description: Согласие на обработку персональных данных (152-ФЗ). Должно быть true.
        source:
          type: string
          maxLength: 200
          description: CTA-источник заявки (например, "itityl-landing:services-hero-discuss").
        pageUrl:
          type: string
          maxLength: 2048
          description: URL страницы, с которой отправлена форма.
        referrer:
          type: string
          maxLength: 2048
          description: document.referrer на момент отправки.
        utmSource:
          type: string
          maxLength: 200
        utmMedium:
          type: string
          maxLength: 200
        utmCampaign:
          type: string
          maxLength: 200
        utmContent:
          type: string
          maxLength: 200
        utmTerm:
          type: string
          maxLength: 200
        website:
          type: string
          description: Honeypot field — must be empty
          maxLength: 200
      required:
        - name
        - company
        - requestType
        - consent
    ContactSubmissionResult:
      type: object
      properties:
        ok:
          type: boolean
        id:
          type: integer
      required:
        - ok
    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
